name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify clean baseline worktree
        run: npm run baseline:verify-clean

      - name: Run quality gate bundle
        run: npm run quality:ci

      - name: Build electron bundle
        run: npm run build:electron
