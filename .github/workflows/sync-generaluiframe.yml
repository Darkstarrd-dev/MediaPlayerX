name: Sync GeneralUIFrame Subtree

on:
  push:
    branches:
      - main
    paths:
      - 'apps/GeneralUIFrame/**'
      - '.github/workflows/sync-generaluiframe.yml'
  workflow_dispatch:

jobs:
  subtree-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate sync token
        shell: bash
        env:
          SYNC_TOKEN: ${{ secrets.GENERAL_UI_FRAME_SYNC_TOKEN }}
        run: |
          if [ -z "$SYNC_TOKEN" ]; then
            echo "缺少仓库机密 GENERAL_UI_FRAME_SYNC_TOKEN，无法同步子仓库。"
            echo "请在主仓库 Settings -> Secrets and variables -> Actions 中配置该机密。"
            exit 1
          fi

      - name: Sync apps/GeneralUIFrame to standalone repo
        shell: bash
        env:
          SYNC_TOKEN: ${{ secrets.GENERAL_UI_FRAME_SYNC_TOKEN }}
        run: |
          TARGET_REPO="https://github.com/Darkstarrd-dev/GeneralUIFrame.git"
          BASIC_AUTH=$(printf "x-access-token:%s" "$SYNC_TOKEN" | base64 | tr -d '\n')
          AUTH_HEADER="AUTHORIZATION: basic ${BASIC_AUTH}"
          SPLIT_SHA=$(git subtree split --prefix=apps/GeneralUIFrame HEAD)

          REMOTE_LINE=$(git -c http.https://github.com/.extraheader="$AUTH_HEADER" ls-remote "$TARGET_REPO" refs/heads/main)
          REMOTE_SHA=${REMOTE_LINE%%$'\t'*}
          if [ -n "$REMOTE_SHA" ] && [ "$REMOTE_SHA" = "$SPLIT_SHA" ]; then
            echo "GeneralUIFrame 子仓库已是最新，无需推送。"
            exit 0
          fi

          git -c http.https://github.com/.extraheader="$AUTH_HEADER" push "$TARGET_REPO" "${SPLIT_SHA}:main"
