<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediaPlayerX</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #f2eee7;
      }

      #root {
        width: 100%;
        height: 100%;
      }

      .boot-shell {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        color: #6a6358;
        font-family: 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        position: relative;
        overflow: hidden;
      }

      .boot-shell::after {
        content: '';
        position: absolute;
        top: 0;
        left: -30%;
        width: 30%;
        height: 100%;
        pointer-events: none;
        background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.32) 52%, rgba(255, 255, 255, 0) 100%);
        animation: boot-sheen 2.4s linear infinite;
      }

      .boot-shell__header {
        height: 56px;
        border-bottom: 1px solid #d6cfc1;
        background: linear-gradient(120deg, #f4ebe0 0%, #f7f4ef 42%, #ece6d8 100%);
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 14px;
      }

      .boot-shell__pill {
        height: 24px;
        border-radius: 999px;
        background: #e3dacb;
        opacity: 0.9;
        animation: boot-pulse 1.8s ease-in-out infinite;
      }

      .boot-shell__pill--logo {
        width: 136px;
      }

      .boot-shell__pill--wide {
        width: 88px;
      }

      .boot-shell__body {
        min-height: 0;
        flex: 1;
        display: flex;
        gap: 8px;
        padding: 8px;
      }

      .boot-shell__sidebar,
      .boot-shell__main,
      .boot-shell__meta {
        border: 1px solid #d6cfc1;
        border-radius: 10px;
        background: #fbf8f3;
        animation: boot-pulse 1.8s ease-in-out infinite;
      }

      .boot-shell__sidebar {
        width: 24%;
        min-width: 190px;
      }

      .boot-shell__main {
        min-width: 0;
        flex: 1;
      }

      .boot-shell__meta {
        width: 27%;
        min-width: 210px;
      }

      .boot-shell__hint {
        margin-top: 14px;
        text-align: center;
        font-size: 13px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .boot-shell__hint::before {
        content: '';
        width: 12px;
        height: 12px;
        border-radius: 999px;
        border: 2px solid #ccb89f;
        border-top-color: #a86f46;
        animation: boot-spin 0.9s linear infinite;
      }

      @keyframes boot-pulse {
        0%,
        100% {
          opacity: 0.7;
        }

        50% {
          opacity: 1;
        }
      }

      @keyframes boot-sheen {
        from {
          transform: translateX(0);
        }

        to {
          transform: translateX(440%);
        }
      }

      @keyframes boot-spin {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-shell" aria-hidden="true">
        <div class="boot-shell__header">
          <div class="boot-shell__pill boot-shell__pill--logo"></div>
          <div class="boot-shell__pill boot-shell__pill--wide"></div>
          <div class="boot-shell__pill boot-shell__pill--wide"></div>
        </div>
        <div class="boot-shell__body">
          <section class="boot-shell__sidebar"></section>
          <main class="boot-shell__main"></main>
          <aside class="boot-shell__meta"></aside>
        </div>
        <div class="boot-shell__hint">加载中...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
