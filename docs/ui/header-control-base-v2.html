<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Header Control Base v2 - Soft Skeuomorphic</title>

    <style>
      /* ====================================================================
       * Header Control Base v2
       * Requirements:
       * - Header buttons match video control center-group button style (raised).
       * - Zoom + Autoplay share video control left-group container style (inset).
       * - Zoom & Autoplay are configured via hover popovers.
       * - Autoplay shows value (no icon); click toggles on/off; state via border.
       * - Zoom popover uses vertical 9-step discrete slider (like volume).
       * - Icons:
       *   - Fixed: image=v1, video=v1, search=v1, meta=v4, settings=v2.
       *   - Music has 2 states: v1 (inactive) and v3 (active), redrawn.
       *   - Variants: idle(5), busy(5), zoom(5), edit(5).
       * Theme variables are ported from docs/ui/video-control-base.html.
       * ==================================================================== */

      /* --- Theme Variables: Light Component (v4) --- */
      :root {
        --page-bg: #f0f2f5;
        --shell-bg: #e6e7ee;
        --text-main: #444;
        --text-muted: #555;
        --text-dim: #888;
        --shadow-dark: #d1d1d1;
        --shadow-light: #ffffff;
        --accent-fill: #333;
        --border-color: rgba(255, 255, 255, 0.5);
        --inset-bg: #e6e7ee;

        --popup-bg: #e6e7ee;
        --popup-hover: rgba(0, 0, 0, 0.05);

        --btn-round-size: 40px;
        --btn-round-radius: 12px;
        --btn-ctrl-size: 32px;
        --btn-ctrl-radius: 8px;

        --group-radius: 6px;
        --group-pad-y: 6px;
        --group-pad-x: 12px;
      }

      /* --- Theme Variables: Dark Component (v6) on Light Background --- */
      body[data-theme="inverted"] {
        --page-bg: #1a1a1a;
        --shell-bg: #292d32;
        --text-main: #cfcfcf;
        --text-muted: #cfcfcf;
        --text-dim: #666;
        --shadow-dark: #1e2125;
        --shadow-light: #34393f;
        --accent-fill: #ff9f43;
        --border-color: #4a3c2e;
        --inset-bg: #26292e;

        --popup-bg: #292d32;
        --popup-hover: rgba(255, 255, 255, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 18px;
        min-height: 100vh;
        background: var(--page-bg);
        color: var(--text-main);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      /* --- Page layout --- */
      .mock-page {
        max-width: 1280px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .mock-topbar {
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px 14px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border-color);
        background: var(--shell-bg);
      }

      .mock-topbar strong {
        font-size: 13px;
        font-weight: 800;
        color: var(--text-main);
      }

      .mock-topbar .sep {
        width: 1px;
        height: 20px;
        background: color-mix(in srgb, var(--text-dim) 18%, transparent);
      }

      .mock-topbar label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--text-muted);
        font-size: 12px;
      }

      .mock-topbar button,
      .mock-topbar select {
        font: inherit;
      }

      .mock-topbar select {
        height: 30px;
        padding: 0 10px;
        border-radius: 10px;
        border: 1px solid var(--border-color);
        background: var(--shell-bg);
        color: var(--text-main);
        box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light);
        outline: none;
      }

      /* --- Header shell --- */
      .app-header-mock {
        border-radius: 10px;
        border: 1px solid var(--border-color);
        background: var(--shell-bg);
        padding: 8px 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .header-left,
      .header-right {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .header-left {
        flex: 1;
        overflow: hidden;
      }

      .header-right {
        flex-shrink: 0;
      }

      /* --- Button styles aligned to video center group (.btn-round) --- */
      button {
        border: none;
        outline: none;
        cursor: pointer;
        background: var(--shell-bg);
        color: var(--text-muted);
        transition: all 0.2s ease;
        font-family: inherit;
        font-weight: 700;
      }

      .btn-round {
        width: var(--btn-round-size);
        height: var(--btn-round-size);
        border-radius: var(--btn-round-radius);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-shadow: 2px 2px 3px var(--shadow-dark), -2px -2px 3px var(--shadow-light);
      }

      .btn-round:active {
        box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
      }

      .btn-round[aria-pressed="true"],
      .btn-round.is-active {
        color: var(--accent-fill);
      }

      .btn-round:focus-visible {
        box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent-fill) 26%, transparent), 2px 2px 3px var(--shadow-dark),
          -2px -2px 3px var(--shadow-light);
      }

      .btn-icon {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.9;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* --- Mode + action row --- */
      .mode-strip {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .spacer {
        width: 1px;
        height: 22px;
        background: color-mix(in srgb, var(--text-dim) 16%, transparent);
      }

      /* --- Left-group container style (video left group) --- */
      .group-inset {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: var(--group-pad-y) var(--group-pad-x);
        border-radius: var(--group-radius);
        background: var(--shell-bg);
        box-shadow: inset 2px 2px 3px var(--shadow-dark), inset -2px -2px 3px var(--shadow-light);
      }

      .group-inset .btn-ctrl,
      .group-inset .btn-value {
        height: var(--btn-ctrl-size);
        min-height: var(--btn-ctrl-size);
        border-radius: var(--btn-ctrl-radius);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--shell-bg);
        color: var(--text-muted);
      }

      .btn-ctrl {
        width: var(--btn-ctrl-size);
        min-width: var(--btn-ctrl-size);
      }

      .btn-value {
        padding: 0 10px;
        border: 1px solid var(--border-color);
        font-size: 12px;
        letter-spacing: 0.02em;
        box-shadow: none;
      }

      .btn-value.is-on {
        border-color: var(--accent-fill);
        color: var(--text-main);
      }

      .value-mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-variant-numeric: tabular-nums;
      }

      /* --- Popovers (ported style) --- */
      .has-popover {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .popover {
        position: absolute;
        bottom: calc(100% + 10px);
        left: 50%;
        transform: translateX(-50%) translateY(10px);
        background: var(--popup-bg);
        border: 1px solid var(--border-color);
        box-shadow: none;
        padding: 6px;
        border-radius: 6px;
        min-width: 96px;
        display: none;
        flex-direction: column;
        gap: 2px;
        z-index: 20;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
      }

      .has-popover:hover .popover {
        display: flex;
        opacity: 1;
        pointer-events: auto;
        transform: translateX(-50%) translateY(0);
      }

      .popover-item {
        padding: 6px 10px;
        font-size: 11px;
        border-radius: 4px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: var(--text-main);
        user-select: none;
      }

      .popover-item:hover {
        background: var(--inset-bg);
        color: var(--accent-fill);
      }

      .popover-item.is-active {
        background: var(--inset-bg);
        color: var(--accent-fill);
        font-weight: 800;
      }

      .popover-title {
        padding: 4px 8px;
        font-size: 10px;
        text-transform: uppercase;
        color: var(--text-dim);
        opacity: 0.7;
        border-bottom: 1px solid var(--border-color);
        margin-bottom: 2px;
      }

      /* --- Zoom: vertical 9-step slider --- */
      .popover.zoom-popover {
        min-width: auto;
        width: 52px;
        padding: 10px 0;
        align-items: center;
      }

      .zoom-track {
        position: relative;
        width: 6px;
        height: 108px;
        border-radius: 3px;
        background: var(--inset-bg);
        box-shadow: inset 1px 1px 3px var(--shadow-dark), inset -1px -1px 3px var(--shadow-light);
        display: grid;
        grid-template-rows: repeat(9, 1fr);
        gap: 4px;
        padding: 4px 0;
      }

      .zoom-step {
        width: 6px;
        border-radius: 3px;
        background: color-mix(in srgb, var(--inset-bg) 78%, var(--shadow-dark));
        border: none;
        padding: 0;
        cursor: pointer;
      }

      .zoom-step.is-active {
        background: var(--accent-fill);
      }

      .zoom-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--shell-bg);
        border: 1px solid var(--border-color);
        box-shadow: 1px 1px 3px var(--shadow-dark);
        position: absolute;
        left: 50%;
        transform: translate(-50%, 50%);
        bottom: 0%;
        pointer-events: none;
      }

      .card {
        border-radius: 10px;
        border: 1px solid color-mix(in srgb, var(--border-color) 70%, transparent);
        background: color-mix(in srgb, var(--shell-bg) 92%, transparent);
        padding: 12px;
      }

      .card h2 {
        margin: 0 0 10px;
        font-size: 13px;
        font-weight: 900;
        letter-spacing: 0.02em;
        color: var(--text-main);
      }

      .pick-grid {
        display: grid;
        grid-template-columns: 160px 1fr;
        gap: 10px 12px;
        align-items: start;
      }

      .pick-grid .label {
        color: var(--text-muted);
        font-size: 12px;
        padding-top: 6px;
      }

      .pick-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .pick {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        border: 1px solid var(--border-color);
        background: var(--shell-bg);
        color: var(--text-muted);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-shadow: 2px 2px 3px var(--shadow-dark), -2px -2px 3px var(--shadow-light);
        transition: transform 0.12s ease, box-shadow 0.12s ease;
      }

      .pick:hover {
        transform: translateY(-1px);
      }

      .pick.is-selected {
        color: var(--accent-fill);
        box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
        transform: translateY(0px);
      }

      .hint {
        margin: 8px 0 0;
        color: var(--text-dim);
        font-size: 12px;
      }
    </style>
  </head>

          <!-- Zoom + Autoplay: combined inset group, configured via hover popovers -->
          <div class="group-inset" role="group" aria-label="zoom and autoplay">
            <div class="has-popover" aria-label="zoom popover">
              <button class="btn-ctrl" id="zoom-trigger" type="button" aria-label="缩放级别" title="缩放级别">
                <svg class="btn-icon" viewBox="0 0 24 24" style="width: 18px; height: 18px"><use id="zoom-use" href="#i-zoom-v1" /></svg>
              </button>
              <span class="value-mono" id="zoom-read">6</span>
              <div class="popover zoom-popover" role="dialog" aria-label="缩放设置">
                <div class="zoom-track" id="zoom-track">
                  <button class="zoom-step" type="button" data-step="9" aria-label="Zoom 9"></button>
                  <button class="zoom-step" type="button" data-step="8" aria-label="Zoom 8"></button>
                  <button class="zoom-step" type="button" data-step="7" aria-label="Zoom 7"></button>
                  <button class="zoom-step" type="button" data-step="6" aria-label="Zoom 6"></button>
                  <button class="zoom-step" type="button" data-step="5" aria-label="Zoom 5"></button>
                  <button class="zoom-step" type="button" data-step="4" aria-label="Zoom 4"></button>
                  <button class="zoom-step" type="button" data-step="3" aria-label="Zoom 3"></button>
                  <button class="zoom-step" type="button" data-step="2" aria-label="Zoom 2"></button>
                  <button class="zoom-step" type="button" data-step="1" aria-label="Zoom 1"></button>
                  <div class="zoom-thumb" id="zoom-thumb"></div>
                </div>
              </div>
            </div>

            <div class="has-popover" aria-label="autoplay popover">
              <button class="btn-value value-mono" id="auto-btn" type="button" aria-label="自动播放" aria-pressed="false" title="自动播放">
                <span id="auto-read">2s</span>
              </button>
              <div class="popover" role="dialog" aria-label="自动播放间隔">
                <div class="popover-title">Autoplay</div>
                <div class="popover-item" data-interval="1">1s</div>
                <div class="popover-item is-active" data-interval="2">2s</div>
                <div class="popover-item" data-interval="3">3s</div>
                <div class="popover-item" data-interval="5">5s</div>
              </div>
            </div>
          </div>

          <button class="btn-round" type="button" aria-label="设置" aria-pressed="false" title="设置">
            <svg class="btn-icon" viewBox="0 0 24 24"><use href="#i-settings-v2" /></svg>
          </button>
        </div>
      </header>

      <div class="card" aria-label="icon variants">
        <h2>Icon Variants</h2>
        <div class="pick-grid" id="pick-grid">
          <div class="label">空闲 (Idle)</div>
          <div class="pick-row" data-pick="idle">
            <button class="pick is-selected" type="button" data-kind="idle" data-variant="1"><svg class="btn-icon" viewBox="0 0 24 24"><use href="#i-idle-v1" /></svg></button>
            <button class="pick" type="button" data-kind="idle" data-variant="2"><svg class="btn-icon" viewBox="0 0 24 24"><use href="#i-idle-v2" /></svg></button>
            <button class="pick" type="button" data-kind="idle" data-variant="3"><svg class="btn-icon" viewBox="0 0 24 24"><use href="#i-idle-v3" /></svg></button>
            <button class="pick" type="button" data-kind="idle" data-variant="4"><svg class="btn-icon" viewBox="0 0 24 24"><use href="#i-idle-v4" /></svg></button>
            <button class="pick" type="button" data-kind="idle" data-variant="5"><svg class="btn-icon" viewBox="0 0 24 24"><use href="#i-idle-v5" /></svg></button>
          </div>

          <div class="label">忙碌 (Busy)</div>
          <div class="pick-row" data-pick="busy">
            <button class="pick is-selected" type="button" data-kind="busy" data-variant="1"><svg class="btn-icon" viewBox="0 0 24 24"><use href="#i-busy-v1" /></svg></button>
            <button class="pick" type="button" data-kind="busy" data-variant="2"><svg class="btn-icon" viewBox="0 0 24 24"><use href="#i-busy-v2" /></svg></button>
            <button class="pick" type="button" data-kind="busy" data-variant="3"><svg class="btn-icon" viewBox="0 0 24 24"><use href="#i-busy-v3" /></svg></button>
            <button class="pick" type="button" data-kind="busy" data-variant="4"><svg class="btn-icon" viewBox="0 0 24 24"><use href="#i-busy-v4" /></svg></button>
            <button class="pick" type="button" data-kind="busy" data-variant="5"><svg class="btn-icon" viewBox="0 0 24 24"><use href="#i-busy-v5" /></svg></button>
          </div>

          <div class="label">缩放 (Zoom)</div>
          <div class="pick-row" data-pick="zoom">
            <button class="pick is-selected" type="button" data-kind="zoom" data-variant="1"><svg class="btn-icon" viewBox="0 0 24 24"><use href="#i-zoom-v1" /></svg></button>
            <button class="pick" type="button" data-kind="zoom" data-variant="2"><svg class="btn-icon" viewBox="0 0 24 24"><use href="#i-zoom-v2" /></svg></button>
            <button class="pick" type="button" data-kind="zoom" data-variant="3"><svg class="btn-icon" viewBox="0 0 24 24"><use href="#i-zoom-v3" /></svg></button>
            <button class="pick" type="button" data-kind="zoom" data-variant="4"><svg class="btn-icon" viewBox="0 0 24 24"><use href="#i-zoom-v4" /></svg></button>
            <button class="pick" type="button" data-kind="zoom" data-variant="5"><svg class="btn-icon" viewBox="0 0 24 24"><use href="#i-zoom-v5" /></svg></button>
          </div>

          <div class="label">编辑 (Edit)</div>
          <div class="pick-row" data-pick="edit">
            <button class="pick is-selected" type="button" data-kind="edit" data-variant="1"><svg class="btn-icon" viewBox="0 0 24 24"><use href="#i-edit-v1" /></svg></button>
            <button class="pick" type="button" data-kind="edit" data-variant="2"><svg class="btn-icon" viewBox="0 0 24 24"><use href="#i-edit-v2" /></svg></button>
            <button class="pick" type="button" data-kind="edit" data-variant="3"><svg class="btn-icon" viewBox="0 0 24 24"><use href="#i-edit-v3" /></svg></button>
            <button class="pick" type="button" data-kind="edit" data-variant="4"><svg class="btn-icon" viewBox="0 0 24 24"><use href="#i-edit-v4" /></svg></button>
            <button class="pick" type="button" data-kind="edit" data-variant="5"><svg class="btn-icon" viewBox="0 0 24 24"><use href="#i-edit-v5" /></svg></button>
          </div>
        </div>
        <p class="hint">已定型：image=v1, video=v1, music=v1/v3, search=v1, meta=v4, settings=v2；仅上方 4 组提供变体。</p>
      </div>
    </div>

    <script>
      const state = {
        busy: false,
        idleVariant: 1,
        busyVariant: 1,
        zoomVariant: 1,
        editVariant: 1,
        mode: 'image',
        zoomLevel: 6,
        autoEnabled: false,
        autoInterval: 2,
      }

      const el = {
        themeToggle: document.getElementById('theme-toggle'),
        busyToggle: document.getElementById('busy-toggle'),
        taskStatus: document.getElementById('task-status'),
        taskStatusUse: document.getElementById('task-status-use'),
        musicUse: document.getElementById('music-use'),
        zoomUse: document.getElementById('zoom-use'),
        editUse: document.getElementById('edit-use'),
        zoomRead: document.getElementById('zoom-read'),
        zoomThumb: document.getElementById('zoom-thumb'),
        zoomTrack: document.getElementById('zoom-track'),
        autoBtn: document.getElementById('auto-btn'),
        autoRead: document.getElementById('auto-read'),
      }

      function clampInt(value, min, max) {
        const n = Number(value)
        if (!Number.isFinite(n)) return min
        return Math.max(min, Math.min(max, Math.round(n)))
      }

      function hrefFor(kind, variant) {
        const v = clampInt(variant, 1, 5)
        if (kind === 'idle') return `#i-idle-v${v}`
        if (kind === 'busy') return `#i-busy-v${v}`
        if (kind === 'zoom') return `#i-zoom-v${v}`
        return `#i-edit-v${v}`
      }

      function renderTaskStatusIcon() {
        const kind = state.busy ? 'busy' : 'idle'
        const variant = state.busy ? state.busyVariant : state.idleVariant
        el.taskStatusUse?.setAttribute('href', hrefFor(kind, variant))
      }

      function renderZoom() {
        if (el.zoomRead) el.zoomRead.textContent = String(state.zoomLevel)
        const steps = el.zoomTrack ? Array.from(el.zoomTrack.querySelectorAll('.zoom-step')) : []
        for (const step of steps) {
          const value = clampInt(step.getAttribute('data-step'), 1, 9)
          step.classList.toggle('is-active', value <= state.zoomLevel)
        }

        if (el.zoomThumb) {
          const pct = ((state.zoomLevel - 1) / 8) * 100
          el.zoomThumb.style.bottom = `${pct}%`
        }
      }

      function renderAutoplay() {
        if (el.autoRead) el.autoRead.textContent = `${state.autoInterval}s`
        if (el.autoBtn) {
          el.autoBtn.classList.toggle('is-on', state.autoEnabled)
          el.autoBtn.setAttribute('aria-pressed', state.autoEnabled ? 'true' : 'false')
        }
        for (const item of document.querySelectorAll('.has-popover .popover .popover-item[data-interval]')) {
          const value = clampInt(item.getAttribute('data-interval'), 1, 60)
          item.classList.toggle('is-active', value === state.autoInterval)
        }
      }

      function setMode(nextMode) {
        state.mode = nextMode
        for (const btn of document.querySelectorAll('[data-mode]')) {
          const mode = btn.getAttribute('data-mode')
          const active = mode === nextMode
          btn.classList.toggle('is-active', active)
          btn.setAttribute('aria-pressed', active ? 'true' : 'false')
        }
        // music icon has two states: v1 (inactive) and v3 (active)
        if (el.musicUse) {
          el.musicUse.setAttribute('href', nextMode === 'music' ? '#i-music-v3' : '#i-music-v1')
        }
      }

      function setSelected(kind, variant) {
        const v = clampInt(variant, 1, 5)
        if (kind === 'idle') state.idleVariant = v
        if (kind === 'busy') state.busyVariant = v
        if (kind === 'zoom') state.zoomVariant = v
        if (kind === 'edit') state.editVariant = v

        for (const btn of document.querySelectorAll(`.pick[data-kind="${kind}"]`)) {
          const current = clampInt(btn.getAttribute('data-variant'), 1, 5)
          btn.classList.toggle('is-selected', current === v)
        }

        if (kind === 'zoom') el.zoomUse?.setAttribute('href', hrefFor('zoom', v))
        if (kind === 'edit') el.editUse?.setAttribute('href', hrefFor('edit', v))
        if (kind === 'idle' || kind === 'busy') renderTaskStatusIcon()
      }

      // init fixed icons
      el.zoomUse?.setAttribute('href', hrefFor('zoom', state.zoomVariant))
      el.editUse?.setAttribute('href', hrefFor('edit', state.editVariant))
      renderTaskStatusIcon()
      renderZoom()
      renderAutoplay()
      setMode('image')

      // theme toggle
      el.themeToggle?.addEventListener('click', () => {
        const inverted = document.body.getAttribute('data-theme') === 'inverted'
        if (inverted) {
          document.body.removeAttribute('data-theme')
        } else {
          document.body.setAttribute('data-theme', 'inverted')
        }
      })

      // task status toggle (panel open/close in app)
      el.taskStatus?.addEventListener('click', () => {
        const pressed = el.taskStatus.getAttribute('aria-pressed') === 'true'
        el.taskStatus.setAttribute('aria-pressed', pressed ? 'false' : 'true')
      })

      // busy toggle (affects task-status icon set)
      el.busyToggle?.addEventListener('change', () => {
        state.busy = el.busyToggle.value === '1'
        renderTaskStatusIcon()
      })

      // mode switching
      document.querySelector('.mode-strip')?.addEventListener('click', (event) => {
        const btn = event.target instanceof Element ? event.target.closest('[data-mode]') : null
        if (!btn) return
        const nextMode = btn.getAttribute('data-mode')
        if (!nextMode) return
        setMode(nextMode)
      })

      // zoom steps
      el.zoomTrack?.addEventListener('click', (event) => {
        const step = event.target instanceof Element ? event.target.closest('.zoom-step') : null
        if (!step) return
        const next = clampInt(step.getAttribute('data-step'), 1, 9)
        state.zoomLevel = next
        renderZoom()
      })

      // autoplay toggle
      el.autoBtn?.addEventListener('click', () => {
        state.autoEnabled = !state.autoEnabled
        renderAutoplay()
      })

      // autoplay interval selection
      for (const item of document.querySelectorAll('.has-popover .popover .popover-item[data-interval]')) {
        item.addEventListener('click', () => {
          state.autoInterval = clampInt(item.getAttribute('data-interval'), 1, 60)
          renderAutoplay()
        })
      }

      // icon variant picking
      document.getElementById('pick-grid')?.addEventListener('click', (event) => {
        const btn = event.target instanceof Element ? event.target.closest('.pick') : null
        if (!btn) return
        const kind = btn.getAttribute('data-kind')
        const variant = btn.getAttribute('data-variant')
        if (!kind || !variant) return
        setSelected(kind, variant)
      })
    </script>
  </body>
</html>
