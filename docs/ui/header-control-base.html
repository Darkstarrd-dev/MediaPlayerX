<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Header Control Base - Soft Skeuomorphic</title>

    <style>
      /* ====================================================================
       * Header Control Base
       * - Self-contained mock for header controls.
       * - Ported theme variables from docs/ui/video-control-base.html
       * - Provides:
       *   1) Icon-only buttons (replacing text buttons)
       *   2) 5 icon variants per action
       *   3) 5 button style variants
       *   4) 5 zoom-group implementations
       *   5) 5 autoplay-group implementations
       * ==================================================================== */

      /* --- Theme Variables (Light Component / v4) --- */
      :root {
        --page-bg: #f0f2f5;
        --shell-bg: #e6e7ee;
        --text-main: #444444;
        --text-muted: #555555;
        --text-dim: #888888;
        --shadow-dark: #d1d1d1;
        --shadow-light: #ffffff;
        --accent-fill: #333333;
        --border-color: rgba(255, 255, 255, 0.5);
        --inset-bg: #e6e7ee;
        --popup-bg: #e6e7ee;
        --popup-hover: rgba(0, 0, 0, 0.05);

        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 14px;
        --radius-pill: 999px;

        --btn-size: 40px;
        --btn-radius: 10px;
        --btn-gap: 10px;
        --btn-font: 600 12px/1 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }

      /* --- Theme Variables (Dark Component / v6) --- */
      body[data-theme="inverted"] {
        --page-bg: #1a1a1a;
        --shell-bg: #292d32;
        --text-main: #cfcfcf;
        --text-muted: #cfcfcf;
        --text-dim: #666666;
        --shadow-dark: #1e2125;
        --shadow-light: #34393f;
        --accent-fill: #ff9f43;
        --border-color: #4a3c2e;
        --inset-bg: #26292e;
        --popup-bg: #292d32;
        --popup-hover: rgba(255, 255, 255, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 24px;
        min-height: 100vh;
        background: var(--page-bg);
        color: var(--text-main);
        font: var(--btn-font);
      }

      .mock-page {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .mock-toolbar {
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        flex-wrap: wrap;
        gap: 10px 16px;
        align-items: center;
        padding: 10px 12px;
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        background: var(--shell-bg);
        box-shadow: 0 10px 18px rgba(0, 0, 0, 0.08);
      }

      body[data-theme="inverted"] .mock-toolbar {
        box-shadow: 0 10px 18px rgba(0, 0, 0, 0.45);
      }

      .mock-toolbar strong {
        font-size: 13px;
        letter-spacing: 0.02em;
        color: var(--text-main);
      }

      .mock-toolbar label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
        color: var(--text-muted);
        font-size: 12px;
      }

      .mock-toolbar select,
      .mock-toolbar button {
        font: inherit;
      }

      .mock-toolbar select {
        height: 32px;
        padding: 0 10px;
        border-radius: 10px;
        border: 1px solid var(--border-color);
        background: var(--shell-bg);
        color: var(--text-main);
        box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light);
        outline: none;
      }

      .mock-toolbar .mock-sep {
        width: 1px;
        height: 20px;
        background: color-mix(in srgb, var(--text-dim) 18%, transparent);
      }

      .hc-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
        padding: 10px 12px;
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        background: var(--shell-bg);
        color: var(--text-main);
      }

      .hc-left,
      .hc-right {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .hc-left {
        flex: 1;
        overflow: hidden;
      }

      .hc-segment {
        display: flex;
        align-items: center;
        gap: var(--btn-gap);
        flex-wrap: wrap;
      }

      .hc-group {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 10px;
        border: 1px solid var(--border-color);
        background: var(--shell-bg);
        box-shadow: inset 2px 2px 3px var(--shadow-dark), inset -2px -2px 3px var(--shadow-light);
      }

      .hc-group-title {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        color: var(--text-muted);
      }

      .hc-btn {
        width: var(--btn-size);
        height: var(--btn-size);
        border-radius: var(--btn-radius);
        padding: 0;
        border: 1px solid var(--border-color);
        background: var(--shell-bg);
        color: var(--text-muted);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        user-select: none;
        transition: transform 0.15s ease, filter 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, color 0.15s ease;
      }

      .hc-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .hc-btn[aria-pressed="true"],
      .hc-btn.is-active {
        color: var(--accent-fill);
      }

      .hc-btn:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent-fill) 26%, transparent);
      }

      .hc-icon {
        width: 20px;
        height: 20px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.9;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .hc-icon.is-thin {
        stroke-width: 1.6;
      }

      .hc-icon.is-fill {
        fill: currentColor;
        stroke: none;
      }

      .hc-pill {
        height: 32px;
        padding: 0 10px;
        border-radius: 10px;
        border: 1px solid var(--border-color);
        background: var(--shell-bg);
        color: var(--text-main);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light);
      }

      .hc-pill strong {
        min-width: 18px;
        text-align: center;
        font-variant-numeric: tabular-nums;
      }

      .hc-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: color-mix(in srgb, var(--shell-bg) 86%, transparent);
        box-shadow: inset 2px 2px 3px var(--shadow-dark), inset -2px -2px 3px var(--shadow-light);
        border: 1px solid color-mix(in srgb, var(--border-color) 70%, transparent);
      }

      .hc-dot.is-on {
        background: var(--accent-fill);
        box-shadow: 1px 1px 3px var(--shadow-dark);
        border-color: var(--border-color);
      }

      .hc-value {
        min-width: 18px;
        text-align: center;
        color: var(--text-main);
        font-variant-numeric: tabular-nums;
      }

      /* ====================================================================
       * Button Style Variants (1..5)
       * - Applied via <html data-btn-style="X">
       * ==================================================================== */

      html[data-btn-style="1"] .hc-btn {
        box-shadow: none;
      }

      html[data-btn-style="1"] .hc-btn:active {
        box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
      }

      html[data-btn-style="2"] .hc-btn {
        box-shadow: 2px 2px 3px var(--shadow-dark), -2px -2px 3px var(--shadow-light);
      }

      html[data-btn-style="2"] .hc-btn:active {
        box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
      }

      html[data-btn-style="3"] .hc-btn {
        border-color: transparent;
        box-shadow: none;
        background: color-mix(in srgb, var(--shell-bg) 92%, var(--inset-bg));
      }

      html[data-btn-style="3"] .hc-btn[aria-pressed="true"],
      html[data-btn-style="3"] .hc-btn.is-active {
        border-color: var(--border-color);
        box-shadow: 2px 2px 3px var(--shadow-dark), -2px -2px 3px var(--shadow-light);
      }

      html[data-btn-style="3"] .hc-btn:active {
        box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
      }

      html[data-btn-style="4"] .hc-btn {
        background: linear-gradient(
          145deg,
          color-mix(in srgb, var(--shell-bg) 92%, #fff),
          color-mix(in srgb, var(--shell-bg) 82%, var(--shadow-dark))
        );
        box-shadow: 2px 2px 3px var(--shadow-dark), -2px -2px 3px var(--shadow-light);
      }

      html[data-btn-style="4"] body[data-theme="inverted"] .hc-btn {
        background: linear-gradient(
          145deg,
          color-mix(in srgb, var(--shell-bg) 95%, var(--shadow-light)),
          color-mix(in srgb, var(--shell-bg) 78%, var(--shadow-dark))
        );
      }

      html[data-btn-style="4"] .hc-btn:active {
        box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
      }

      html[data-btn-style="5"] .hc-btn {
        background: transparent;
        border: 1px solid color-mix(in srgb, var(--border-color) 70%, transparent);
        box-shadow: none;
      }

      html[data-btn-style="5"] .hc-btn:hover {
        background: color-mix(in srgb, var(--shell-bg) 82%, transparent);
      }

      html[data-btn-style="5"] .hc-btn:active {
        background: var(--shell-bg);
        box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
      }

      /* ====================================================================
       * Zoom / Autoplay Group Variant Switch (1..5)
       * - Applied via <html data-zoom-variant="X" data-auto-variant="Y">
       * ==================================================================== */

      .hc-variant {
        display: none;
      }

      html[data-zoom-variant="1"] .hc-zoom .hc-variant[data-variant="1"],
      html[data-zoom-variant="2"] .hc-zoom .hc-variant[data-variant="2"],
      html[data-zoom-variant="3"] .hc-zoom .hc-variant[data-variant="3"],
      html[data-zoom-variant="4"] .hc-zoom .hc-variant[data-variant="4"],
      html[data-zoom-variant="5"] .hc-zoom .hc-variant[data-variant="5"] {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      html[data-auto-variant="1"] .hc-auto .hc-variant[data-variant="1"],
      html[data-auto-variant="2"] .hc-auto .hc-variant[data-variant="2"],
      html[data-auto-variant="3"] .hc-auto .hc-variant[data-variant="3"],
      html[data-auto-variant="4"] .hc-auto .hc-variant[data-variant="4"],
      html[data-auto-variant="5"] .hc-auto .hc-variant[data-variant="5"] {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .hc-mini-range {
        width: 120px;
      }

      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        height: 14px;
        background: transparent;
        margin: 0;
      }

      input[type="range"]::-webkit-slider-runnable-track {
        height: 6px;
        border-radius: 2px;
        background: var(--inset-bg);
        box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -1px -1px 2px var(--shadow-light);
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 1px solid var(--border-color);
        background: var(--shell-bg);
        box-shadow: 1px 1px 3px var(--shadow-dark);
        margin-top: -4px;
      }

      input[type="range"]::-moz-range-track {
        height: 6px;
        border: 0;
        border-radius: 2px;
        background: var(--inset-bg);
        box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -1px -1px 2px var(--shadow-light);
      }

      input[type="range"]::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 1px solid var(--border-color);
        background: var(--shell-bg);
        box-shadow: 1px 1px 3px var(--shadow-dark);
      }

      /* ====================================================================
       * Icon Variant Picker
       * ==================================================================== */

      .mock-section {
        border: 1px solid color-mix(in srgb, var(--border-color) 70%, transparent);
        border-radius: var(--radius-lg);
        background: color-mix(in srgb, var(--shell-bg) 92%, transparent);
        padding: 12px;
      }

      .mock-section h2 {
        margin: 0 0 10px;
        font-size: 13px;
        letter-spacing: 0.02em;
        color: var(--text-main);
      }

      .icon-grid {
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 10px 12px;
        align-items: center;
      }

      .icon-grid .action-name {
        color: var(--text-muted);
        font-size: 12px;
      }

      .icon-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .icon-pick {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        border: 1px solid var(--border-color);
        background: var(--shell-bg);
        color: var(--text-muted);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-shadow: 2px 2px 3px var(--shadow-dark), -2px -2px 3px var(--shadow-light);
        transition: transform 0.12s ease, box-shadow 0.12s ease;
      }

      .icon-pick:hover {
        transform: translateY(-1px);
      }

      .icon-pick.is-selected {
        color: var(--accent-fill);
        box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
        transform: translateY(0px);
      }

      /* small visual aid */
      .note {
        color: var(--text-dim);
        font-size: 12px;
        margin: 8px 0 0;
      }
    </style>
  </head>

          </div>
        </div>
        <p class="note">Tip: click an icon variant to update the preview header button.</p>
      </div>
    </div>

    <script>
      const root = document.documentElement
      root.dataset.btnStyle = root.dataset.btnStyle || '2'
      root.dataset.zoomVariant = root.dataset.zoomVariant || '1'
      root.dataset.autoVariant = root.dataset.autoVariant || '1'

      const iconByAction = {
        idle: 1,
        image: 1,
        video: 1,
        music: 1,
        search: 1,
        files: 1,
        meta: 1,
        auto: 1,
        settings: 1,
      }

      function iconHref(action, variant) {
        if (action === 'idle') return `#i-idle-v${variant}`
        if (action === 'image') return `#i-image-v${variant}`
        if (action === 'video') return `#i-video-v${variant}`
        if (action === 'music') return `#i-music-v${variant}`
        if (action === 'search') return `#i-search-v${variant}`
        if (action === 'files') return `#i-files-v${variant}`
        if (action === 'meta') return `#i-meta-v${variant}`
        if (action === 'auto') return `#i-auto-v${variant}`
        return `#i-settings-v${variant}`
      }

      function updateHeaderIcon(action) {
        for (const btn of document.querySelectorAll(`.hc-header [data-action="${action}"]`)) {
          const use = btn.querySelector('use')
          if (use) {
            use.setAttribute('href', iconHref(action, iconByAction[action]))
          }
        }
      }

      function setSelectedPick(action, variant) {
        const row = document.querySelector(`.icon-row[data-action="${action}"]`)
        if (!row) return
        for (const el of row.querySelectorAll('.icon-pick')) {
          const pickVariant = Number(el.getAttribute('data-variant') || '0')
          el.classList.toggle('is-selected', pickVariant === variant)
        }
      }

      for (const action of Object.keys(iconByAction)) {
        updateHeaderIcon(action)
        setSelectedPick(action, iconByAction[action])
      }

      // Icon picker events
      document.getElementById('icon-grid')?.addEventListener('click', (event) => {
        const target = event.target instanceof Element ? event.target.closest('.icon-pick') : null
        if (!target) return
        const action = target.getAttribute('data-action')
        const variant = Number(target.getAttribute('data-variant') || '1')
        if (!action) return
        iconByAction[action] = Math.max(1, Math.min(5, variant))
        updateHeaderIcon(action)
        setSelectedPick(action, iconByAction[action])
      })

      // Variant selectors
      const btnStyleSelect = document.getElementById('btn-style-select')
      const zoomVariantSelect = document.getElementById('zoom-variant-select')
      const autoVariantSelect = document.getElementById('auto-variant-select')

      if (btnStyleSelect) {
        btnStyleSelect.value = root.dataset.btnStyle
        btnStyleSelect.addEventListener('change', () => {
          root.dataset.btnStyle = btnStyleSelect.value
        })
      }

      if (zoomVariantSelect) {
        zoomVariantSelect.value = root.dataset.zoomVariant
        zoomVariantSelect.addEventListener('change', () => {
          root.dataset.zoomVariant = zoomVariantSelect.value
        })
      }

      if (autoVariantSelect) {
        autoVariantSelect.value = root.dataset.autoVariant
        autoVariantSelect.addEventListener('change', () => {
          root.dataset.autoVariant = autoVariantSelect.value
        })
      }

      // Theme toggle
      const themeToggle = document.getElementById('theme-toggle')
      if (themeToggle) {
        themeToggle.addEventListener('click', () => {
          const inverted = document.body.getAttribute('data-theme') === 'inverted'
          if (inverted) {
            document.body.removeAttribute('data-theme')
            themeToggle.setAttribute('aria-pressed', 'false')
          } else {
            document.body.setAttribute('data-theme', 'inverted')
            themeToggle.setAttribute('aria-pressed', 'true')
          }
        })
      }

      // Simple zoom stepper demo (variants 1/2 share same data-zoom buttons)
      let zoomValue = 6
      function renderZoom() {
        const el1 = document.getElementById('zoom-value')
        const el2 = document.getElementById('zoom-value-2')
        if (el1) el1.textContent = String(zoomValue)
        if (el2) el2.textContent = String(zoomValue)
      }
      renderZoom()
      document.querySelector('.hc-zoom')?.addEventListener('click', (event) => {
        const btn = event.target instanceof Element ? event.target.closest('[data-zoom]') : null
        if (!btn) return
        const op = btn.getAttribute('data-zoom')
        if (op === 'dec') zoomValue = Math.max(1, zoomValue - 1)
        if (op === 'inc') zoomValue = Math.min(10, zoomValue + 1)
        renderZoom()
      })

      // Autoplay switch/cycle demo
      let autoOn = false
      const autoSwitch = document.getElementById('auto-switch')
      const autoDot = document.getElementById('auto-dot')
      if (autoSwitch && autoDot) {
        autoSwitch.addEventListener('click', () => {
          autoOn = !autoOn
          autoDot.classList.toggle('is-on', autoOn)
          autoSwitch.setAttribute('aria-pressed', autoOn ? 'true' : 'false')
        })
      }

      const autoCycle = document.getElementById('auto-cycle')
      const autoCycleValue = document.getElementById('auto-cycle-value')
      const cycleValues = ['OFF', '2s', '3s', '5s']
      let cycleIndex = 1
      if (autoCycle && autoCycleValue) {
        autoCycleValue.textContent = cycleValues[cycleIndex]
        autoCycle.addEventListener('click', () => {
          cycleIndex = (cycleIndex + 1) % cycleValues.length
          autoCycleValue.textContent = cycleValues[cycleIndex]
          autoCycle.setAttribute('aria-pressed', cycleIndex === 0 ? 'false' : 'true')
        })
      }
    </script>
  </body>
</html>
